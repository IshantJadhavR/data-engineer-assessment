<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="260" viewBox="0 0 1200 260">
  <defs>
    <style>
      .box { fill: #f8fafc; stroke: #0f172a; stroke-width: 2; rx: 16; ry: 16; }
      .title { font: 700 18px Arial, sans-serif; fill: #0f172a; }
      .text { font: 14px Arial, sans-serif; fill: #334155; }
      .arrow { stroke: #475569; stroke-width: 3; fill: none; marker-end: url(#arrowhead); }
      .note { font: 13px Arial, sans-serif; fill: #475569; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#475569" />
    </marker>
  </defs>

  <rect class="box" x="30" y="70" width="150" height="90" />
  <text class="title" x="105" y="105" text-anchor="middle">Raw CSVs</text>
  <text class="text" x="105" y="130" text-anchor="middle">users / songs</text>
  <text class="text" x="105" y="148" text-anchor="middle">song_plays_raw</text>

  <rect class="box" x="230" y="70" width="180" height="90" />
  <text class="title" x="320" y="105" text-anchor="middle">Python Cleaning</text>
  <text class="text" x="320" y="130" text-anchor="middle">remove duplicates</text>
  <text class="text" x="320" y="148" text-anchor="middle">normalize values</text>

  <rect class="box" x="470" y="70" width="160" height="90" />
  <text class="title" x="550" y="105" text-anchor="middle">Clean CSV</text>
  <text class="text" x="550" y="130" text-anchor="middle">song_plays_clean</text>

  <rect class="box" x="680" y="70" width="180" height="90" />
  <text class="title" x="770" y="105" text-anchor="middle">PostgreSQL</text>
  <text class="text" x="770" y="130" text-anchor="middle">users / songs / plays</text>
  <text class="text" x="770" y="148" text-anchor="middle">loaded via psql</text>

  <rect class="box" x="920" y="70" width="140" height="90" />
  <text class="title" x="990" y="105" text-anchor="middle">SQL Queries</text>
  <text class="text" x="990" y="130" text-anchor="middle">joins, counts,</text>
  <text class="text" x="990" y="148" text-anchor="middle">window functions</text>

  <rect class="box" x="1100" y="70" width="70" height="90" />
  <text class="title" x="1135" y="105" text-anchor="middle">Proof</text>
  <text class="text" x="1135" y="130" text-anchor="middle">screenshots</text>

  <path class="arrow" d="M 180 115 L 230 115" />
  <path class="arrow" d="M 410 115 L 470 115" />
  <path class="arrow" d="M 630 115 L 680 115" />
  <path class="arrow" d="M 860 115 L 920 115" />
  <path class="arrow" d="M 1060 115 L 1100 115" />

  <text class="note" x="770" y="210" text-anchor="middle">Docker Compose can run the PostgreSQL container locally.</text>
</svg>
